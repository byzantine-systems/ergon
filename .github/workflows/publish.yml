name: "[Hex] Publish"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave'

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # To leverage devenv inside Github Actions
      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: "[Mix] Build the package's documentation"
        run: |
          nix develop --impure --command mix docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/dev/docs/eparch/

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-to-hex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Publish to Hex
        run: nix develop --impure --command mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEXPM_API_KEY }}
